name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx
          
      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
          
      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy app/ --ignore-missing-imports || true

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        run: |
          docker build -t privacy-intake:test .
          docker images | grep privacy-intake
          
      - name: Test Docker Compose
        run: |
          docker compose config

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to titan via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TITAN_HOST }}
          username: ${{ secrets.TITAN_USER }}
          key: ${{ secrets.TITAN_SSH_KEY }}
          script: |
            cd /home/stu/.openclaw/workspace/privacy-intake-pack
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose ps
            echo "Deployment complete"
